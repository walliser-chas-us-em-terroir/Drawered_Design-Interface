<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DRAWERED – App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="app-body">

  <!-- Plan de travail -->
  <canvas id="canvas"></canvas>

  <!-- Barre d'outils (haut gauche) -->
  <div class="toolbar">

    <!-- Pinceau + son slider d'épaisseur -->
    <div class="tool-wrap">
      <button id="btn-brush" class="active">Pinceau</button>
      <div id="panel-brush" class="flyout hidden">
        <input type="range" id="brush-size" min="1" max="60" value="6" />
        <span id="brush-size-label">6</span>
      </div>
    </div>

    <!-- Gomme + son slider d'épaisseur -->
    <div class="tool-wrap">
      <button id="btn-eraser">Gomme</button>
      <div id="panel-eraser" class="flyout hidden">
        <input type="range" id="eraser-size" min="1" max="60" value="20" />
        <span id="eraser-size-label">20</span>
      </div>
    </div>

    <!-- Palette de couleur + ses couleurs -->
    <div class="tool-wrap">
      <button id="btn-palette">Couleur</button>
      <div id="panel-palette" class="flyout hidden"></div>
    </div>

    <span class="sep"></span>

    <!-- Actions -->
    <button id="btn-undo">Undo</button>
    <button id="btn-redo">Redo</button>
    <button id="btn-clear">Tout effacer</button>
    <button id="btn-export">Exporter</button>
  </div>

  <!-- Zoom (bas gauche) -->
  <div class="zoom-bar">
    <button id="btn-zoom-out">−</button>
    <span id="zoom-label">100%</span>
    <button id="btn-zoom-in">+</button>
  </div>

  <!-- Info (bas droite) -->
  <button id="btn-info" class="info-btn">Info</button>

  <!-- Modal info -->
  <div id="info-modal" class="modal hidden">
    <div class="modal-box">
      <h2>Information</h2>
      <p>DRAWERED — application de dessin simple.</p>
      <p>Pinceau et gomme (épaisseur réglable), palette de 5 couleurs, annuler/rétablir,
         tout effacer, export PNG et zoom de 50% à 200%.</p>
      <button id="btn-info-close">Fermer</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
