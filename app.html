<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DRAWERED – App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="app-body">

  <!-- Plan de travail -->
  <canvas id="canvas"></canvas>

  <!-- Barre gauche : actions -->
  <div class="toolbar toolbar-left">
    <button id="btn-export" class="btn" title="Exporter (PNG)"><span class="ico ico-export"></span></button>
    <button id="btn-clear" class="btn btn--danger" title="Tout effacer"><span class="ico ico-clear"></span></button>
    <button id="btn-undo" class="btn" title="Annuler"><span class="ico ico-undo"></span></button>
    <button id="btn-redo" class="btn" title="Rétablir"><span class="ico ico-redo"></span></button>
  </div>

  <!-- Barre droite : outils -->
  <div class="toolbar toolbar-right">
    <!-- Couleur -->
    <div class="tool-wrap">
      <button id="btn-palette" class="btn btn--color" title="Couleur"></button>
      <div id="panel-palette" class="flyout palette-flyout hidden"></div>
    </div>
    <!-- Gomme -->
    <div class="tool-wrap">
      <button id="btn-eraser" class="btn" title="Gomme"><span class="ico ico-eraser"></span></button>
      <div id="panel-eraser" class="flyout hidden">
        <input type="range" id="eraser-size" min="1" max="60" value="20" />
        <span class="size-label" id="eraser-size-label">20</span>
      </div>
    </div>
    <!-- Pinceau -->
    <div class="tool-wrap">
      <button id="btn-brush" class="btn active" title="Pinceau"><span class="ico ico-brush"></span></button>
      <div id="panel-brush" class="flyout hidden">
        <input type="range" id="brush-size" min="1" max="60" value="6" />
        <span class="size-label" id="brush-size-label">6</span>
      </div>
    </div>
  </div>

  <!-- Sélecteur de thème (haut centre) -->
  <div class="theme-switch" id="theme-switch">
    <button data-theme-value="light"><span>Light</span></button>
    <button data-theme-value="dark"><span>Dark</span></button>
    <button data-theme-value="sexy"><span>Sexy</span></button>
  </div>

  <!-- Zoom (bas gauche) -->
  <div class="zoom-bar">
    <button id="btn-zoom-out" title="Dézoomer"><span>−</span></button>
    <span id="zoom-label">100%</span>
    <button id="btn-zoom-in" title="Zoomer"><span>+</span></button>
  </div>

  <!-- Info (bas droite) -->
  <button id="btn-info" class="info-btn">Info</button>

  <!-- Modal info -->
  <div id="info-modal" class="modal hidden">
    <div class="modal-box">
      <h1>Information</h1>
      <p>DRAWERED — application de dessin simple.</p>
      <p>Pinceau et gomme (épaisseur réglable), palette de 5 couleurs, annuler / rétablir,
         tout effacer, export PNG et zoom de 50 % à 200 %. Trois thèmes : Light, Dark, Sexy.</p>
      <button id="btn-info-close" class="btn-close"><span>Fermer</span></button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
